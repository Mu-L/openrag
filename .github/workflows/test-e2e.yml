name: E2E Tests

on:
  pull_request:
    paths:
      - 'src/**'
      - 'frontend/**'
      - 'tests/**'
      - 'scripts/**'
      - 'flows/**'
      - 'docker-compose.yml'
      - 'Dockerfile*'
      - 'Makefile'
      - '.github/workflows/test-e2e.yml'
  workflow_dispatch:

jobs:
  e2e:
    runs-on: [self-hosted, linux, ARM64, langflow-ai-arm64-40gb]
    env:
      LANGFLOW_AUTO_LOGIN: "True"
      LANGFLOW_NEW_USER_IS_ACTIVE: "True"
      LANGFLOW_ENABLE_SUPERUSER_CLI: "True"

    steps:
      - name: Cleanup Docker cache
        run: |
          docker system prune -af || true
          docker builder prune -af || true
          docker compose -f docker-compose.yml down -v --remove-orphans || true

      - name: Cleanup root-owned files (OpenSearch data, config)
        run: |
          for i in 1 2 3; do
            docker run --rm -v $(pwd):/work alpine sh -c "rm -rf /work/opensearch-data /work/config" && break
            echo "Attempt $i failed, retrying in 5s..."
            sleep 5
          done || true

      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up UV
        uses: astral-sh/setup-uv@v3
        with:
          version: latest

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Python
        run: uv python install 3.13

      - name: Install backend dependencies
        run: uv sync

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Setup E2E infrastructure
        run: |
          chmod +x scripts/setup-e2e.sh
          ./scripts/setup-e2e.sh

      - name: Run Playwright tests
        working-directory: frontend
        env:
          CI: "true"
          OPENSEARCH_HOST: localhost
          OPENSEARCH_PORT: "9200"
          OPENSEARCH_USERNAME: admin
          GOOGLE_OAUTH_CLIENT_ID: ""
          GOOGLE_OAUTH_CLIENT_SECRET: ""
        run: npx playwright test

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 14

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-test-results
          path: frontend/test-results/
          retention-days: 7

      - name: Teardown infrastructure
        if: always()
        run: |
          docker compose --env-file frontend/.env.test down -v --remove-orphans || true
          docker system prune -f || true
