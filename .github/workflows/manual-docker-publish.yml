name: Manual Docker Publish

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag for the images (defaults to branch name if empty)'
        required: false
      platforms:
        description: 'Platforms to build for (e.g., linux/amd64,linux/arm64)'
        required: true
        default: 'linux/amd64'

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Determine Tag
        id: vars
        run: |
          if [ -z "${{ github.event.inputs.tag }}" ]; then
            TAG=$(echo "${{ github.ref_name }}" | sed 's/[^a-zA-Z0-9._-]/-/g')
          else
            TAG="${{ github.event.inputs.tag }}"
          fi
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Build and push Backend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.backend
          platforms: ${{ github.event.inputs.platforms }}
          push: true
          tags: ${{ secrets.DOCKER_NAMESPACE }}openrag-backend:${{ steps.vars.outputs.tag }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      - name: Build and push Frontend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.frontend
          platforms: ${{ github.event.inputs.platforms }}
          push: true
          tags: ${{ secrets.DOCKER_NAMESPACE }}openrag-frontend:${{ steps.vars.outputs.tag }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

      - name: Build and push Langflow
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.langflow
          platforms: ${{ github.event.inputs.platforms }}
          push: true
          tags: ${{ secrets.DOCKER_NAMESPACE }}openrag-langflow:${{ steps.vars.outputs.tag }}
          cache-from: type=gha,scope=langflow
          cache-to: type=gha,mode=max,scope=langflow

      - name: Build and push OpenSearch
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: ${{ github.event.inputs.platforms }}
          push: true
          tags: ${{ secrets.DOCKER_NAMESPACE }}openrag-opensearch:${{ steps.vars.outputs.tag }}
          cache-from: type=gha,scope=opensearch
          cache-to: type=gha,mode=max,scope=opensearch
