name: 🧪 test invoke ephemeral runner sudo   
on:
  push: 
    branches: [test-ephemeral-runner-sudo]

jobs:
  test-sudo-access:
    runs-on: 
      labels: ["self-hosted", "linux", "ARM64", "langflow-ai-arm64-40gb-ephemeral-sudo"]
    permissions:
      actions: read
      contents: read
    steps:
    - name: Check runner permissions
      run: |
        echo "Current user: $(whoami)"
        echo "Sudo test: $(sudo whoami)"
        sudo -l

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'        
        
    - name: Install Playwright
      run: npm install playwright

    - name: Verify Playwright
      run: npx playwright --version      